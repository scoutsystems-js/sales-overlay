<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sales Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f0f; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; user-select: none; }
    .header { padding: 10px 16px 6px; font-size: 10px; letter-spacing: 2px; color: #555; text-transform: uppercase; }
    .status-row { display: flex; align-items: center; gap: 8px; padding: 0 16px 8px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #444; transition: all 0.3s; }
    .status-dot.active { background: #22c55e; box-shadow: 0 0 8px #22c55e88; }
    .status-text { font-size: 12px; color: #888; }

    .client-row { display: flex; gap: 8px; padding: 0 16px 8px; align-items: center; }
    .client-select { flex: 1; background: #1a1a1a; color: #fff; border: 1px solid #333; border-radius: 6px; padding: 6px 10px; font-size: 12px; cursor: pointer; outline: none; }
    .client-select:focus { border-color: #60a5fa; }
    .btn-upload { background: #1a1a1a; color: #888; border: 1px solid #333; border-radius: 6px; padding: 6px 10px; font-size: 11px; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
    .btn-upload:hover { color: #fff; border-color: #60a5fa; }

    .upload-status { padding: 0 16px 6px; font-size: 11px; color: #22c55e; display: none; }

    .audio-section { padding: 0 16px 8px; }
    .audio-label { font-size: 9px; letter-spacing: 1.5px; color: #555; text-transform: uppercase; margin-bottom: 4px; }
    .audio-row { display: flex; gap: 6px; align-items: center; margin-bottom: 4px; }
    .audio-tag { font-size: 9px; font-weight: 700; letter-spacing: 0.5px; padding: 2px 6px; border-radius: 3px; white-space: nowrap; min-width: 62px; text-align: center; }
    .closer-tag { background: #1e3a5f; color: #60a5fa; }
    .audio-select { flex: 1; background: #1a1a1a; color: #ccc; border: 1px solid #333; border-radius: 6px; padding: 5px 8px; font-size: 11px; cursor: pointer; outline: none; }
    .audio-select:focus { border-color: #60a5fa; }
    .audio-note { font-size: 10px; color: #444; padding: 2px 0 0; }

    .transcript { flex: 1; margin: 0 16px; padding: 10px; background: #1a1a1a; border-radius: 8px; overflow-y: auto; font-size: 12px; line-height: 1.5; }
    .turn { margin-bottom: 6px; }
    .label-closer { color: #60a5fa; font-weight: 600; margin-right: 4px; }
    .label-prospect { color: #fbbf24; font-weight: 600; margin-right: 4px; }
    .controls { display: flex; gap: 8px; padding: 10px 16px; }
    .btn { flex: 1; padding: 8px 0; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-start { background: #22c55e; color: #000; }
    .btn-stop { background: #ef4444; color: #fff; }

    #fileInput { display: none; }
  </style>
</head>
<body>
  <div class="header">Sales Overlay &mdash; Control</div>
  <div class="status-row">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Not listening</span>
  </div>

  <div class="client-row">
    <select class="client-select" id="clientSelect">
      <option value="generic">No Script (Core Framework Only)</option>
    </select>
    <button class="btn-upload" id="btnUpload">+ Upload Script</button>
    <input type="file" id="fileInput" accept=".txt,.md">
  </div>

  <div class="upload-status" id="uploadStatus"></div>

  <div class="audio-section">
    <div class="audio-label">Your Microphone</div>
    <div class="audio-row">
      <span class="audio-tag closer-tag">MIC</span>
      <select class="audio-select" id="micSelect">
        <option value="">Loading devices...</option>
      </select>
    </div>
    <div class="audio-note">Prospect audio is captured automatically from Zoom/FaceTime.</div>
  </div>

  <div class="transcript" id="transcript"></div>
  <div class="controls">
    <button class="btn btn-start" id="btnStart">Start Listening</button>
    <button class="btn btn-stop" id="btnStop" disabled>Stop</button>
  </div>
  <script src="control.js"></script>
</body>
</html>
